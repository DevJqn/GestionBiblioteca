<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background-color: #0056b3; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-center">🏛️ Login - Sistema Biblioteca</h2>
        
        <!-- Mensajes -->
        <div th:if="${param.logout}" class="alert alert-success">
            ✅ Has cerrado sesión correctamente.
        </div>
        <div th:if="${param.signup}" class="alert alert-success">
            ✅ Usuario creado. Ya puedes iniciar sesión.
        </div>
        <div th:if="${param.error}" class="alert alert-danger">
            ❌ Credenciales incorrectas.
        </div>
        
        <!-- Formulario de Login -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" required placeholder="admin o user" />
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="admin123 o user123" />
            </div>
            <div class="form-group text-center">
                <button type="submit" class="btn">🔐 Iniciar Sesión</button>
            </div>
        </form>
        
        <hr>
        <div class="text-center">
            <p><a th:href="@{/signup}">📝 Crear nueva cuenta</a></p>
            <small>
                <strong>Cuentas de prueba:</strong><br>
                👤 admin / admin123 (Administrador)<br>
                👤 user / user123 (Usuario)
            </small>
        </div>
    </div>
</body>
</html>
