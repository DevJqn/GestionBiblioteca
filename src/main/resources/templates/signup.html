<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-center">📝 Crear Nueva Cuenta</h2>
        
        <!-- Mensajes de error -->
        <div th:if="${param.error == 'exists'}" class="alert alert-danger">
            ❌ Ese nombre de usuario ya existe. Prueba con otro.
        </div>
        
        <!-- Formulario de Registro -->
        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="username" required placeholder="Ej: juan_perez" />
                <small>Solo letras, números y guiones bajos</small>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6" />
            </div>
            <div class="form-group text-center">
                <button type="submit" class="btn">✅ Crear Cuenta</button>
            </div>
        </form>
        
        <hr>
        <div class="text-center">
            <a th:href="@{/login}" class="btn btn-secondary">🔙 Volver al Login</a>
        </div>
        
        <div style="margin-top: 20px; padding: 10px; background-color: #e9ecef; border-radius: 4px;">
            <small>
                <strong>ℹ️ Nota:</strong> Las nuevas cuentas se crean con rol de USUARIO. 
                Solo pueden consultar datos, no modificar.
            </small>
        </div>
    </div>
</body>
</html>
