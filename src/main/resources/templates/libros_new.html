<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Libro</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<h1 th:text="${libro.libroId == null ? 'Nuevo Libro' : 'Editar Libro'}"></h1>
<a th:href="@{/libros}">Volver al listado</a>
<form th:action="@{/libros}" th:object="${libro}" method="post">
    <input type="hidden" th:field="*{libroId}" />
    <label>Título:</label>
    <input type="text" th:field="*{titulo}" required />
    <br/>
    <label>Autor:</label>
    <input type="text" th:field="*{autor}" required />
    <br/>
    <label>Categoría:</label>
    <input type="text" th:field="*{categoria}" />
    <br/>
    <label>ISBN:</label>
    <input type="text" th:field="*{isbn}" />
    <br/>
    <label>Estado:</label>
    <select th:field="*{estado}">
        <option value="DISPONIBLE">DISPONIBLE</option>
        <option value="PRESTADO">PRESTADO</option>
    </select>
    <br/>
    <button type="submit">Guardar</button>
</form>
</body>
</html>
