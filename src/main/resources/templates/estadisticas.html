<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #2c3e50; }
        table { border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h1>📊 Estadísticas Biblioteca</h1>

<table>
    <tr>
        <th>Métrica</th>
        <th>Valor</th>
    </tr>
    <tr>
        <td>Total de socios</td>
        <td th:text="${totalSocios}"></td>
    </tr>
    <tr>
        <td>Total de libros</td>
        <td th:text="${totalLibros}"></td>
    </tr>
    <tr>
        <td>Total de préstamos</td>
        <td th:text="${totalPrestamos}"></td>
    </tr>
    <tr>
        <td>Préstamos activos</td>
        <td th:text="${prestamosActivos}"></td>
    </tr>
    <tr>
        <td>Socios sancionados</td>
        <td th:text="${sociosSancionados}"></td>
    </tr>
</table>

<br>
<a th:href="@{/}">Volver al menú</a>

</body>
</html>
